server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip text-based assets.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript application/xml text/xml application/xml+rss text/javascript image/svg+xml application/vnd.apple.mpegurl;

    # Long-lived cache for Vite's hashed, content-addressed assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ------------------------------------------------------------------
    # /api-proxy/<hostname>/<path>  ->  https://<hostname>/<path>
    #
    # Harbor's web build (src/lib/safe-fetch.ts) rewrites cross-origin
    # API calls to this same-origin path so the browser avoids CORS.
    # nginx forwards them to the real upstream.
    #
    # The host allow-list mirrors safe-fetch.ts' PROXY_SUFFIXES /
    # PROXY_HOSTS to prevent SSRF (only Stremio/debrid/addon hosts are
    # forwarded; everything else gets 403).
    # ------------------------------------------------------------------
    location ~ ^/api-proxy/(?<upstream_host>[a-zA-Z0-9._-]+)(?<upstream_uri>/.*)?$ {
        resolver 1.1.1.1 1.0.0.1 8.8.8.8 ipv6=off valid=300s;

        if ($upstream_host !~* "(\.strem\.io|\.stremio\.homes|\.elfhosted\.com|\.strem\.fun|\.baby-beamup\.club|\.workers\.dev|\.debridio\.com|\.code\.run|\.fly\.dev|\.onrender\.com|\.vercel\.app|\.netlify\.app|\.railway\.app|\.deno\.dev)$|^(api\.torbox\.app|api\.real-debrid\.com|api\.alldebrid\.com|debrid-link\.com|www\.premiumize\.me|v3-cinemeta\.strem\.io|opensubtitles-v3\.strem\.io|opensubtitles\.strem\.io|opensubtitles\.stremio\.homes)$") {
            return 403;
        }

        proxy_pass https://$upstream_host$upstream_uri$is_args$args;

        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host $upstream_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Harbor moves Authorization -> x-harbor-auth to dodge browser
        # preflight/CORS stripping. Restore it for the upstream.
        proxy_set_header authorization $http_x_harbor_auth;
        proxy_set_header x-harbor-auth "";

        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # SPA fallback: serve the app for any unknown route so client-side
    # routing (e.g. react-router) handles deep links.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
